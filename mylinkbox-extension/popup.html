<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>damoajo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
    }

    /* 헤더 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 15px;
      font-weight: 700;
      color: #111;
    }
    .logo-icon {
      width: 24px;
      height: 24px;
      background: #2563eb;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 13px;
    }
    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      font-size: 16px;
      padding: 4px;
    }
    .settings-btn:hover { color: #555; }

    /* 상태 화면들 */
    .screen { display: none; }
    .screen.active { display: block; }

    /* 로딩 */
    .loading {
      padding: 40px 20px;
      text-align: center;
      color: #888;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 13px; }

    /* 미리보기 */
    .preview {
      padding: 14px 16px;
    }
    .thumbnail-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #f3f4f6;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
      cursor: pointer;
    }
    .thumbnail-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #aaa;
      font-size: 12px;
    }
    .thumb-placeholder span { font-size: 28px; }
    .thumb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
      color: white;
      font-size: 12px;
    }
    .thumbnail-wrap:hover .thumb-overlay { opacity: 1; }
    .thumb-overlay-icon { font-size: 20px; }

    .field { margin-bottom: 10px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .field input,
    .field select {
      width: 100%;
      height: 36px;
      padding: 0 10px;
      font-size: 13px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      color: #111;
      outline: none;
    }
    .field input:focus,
    .field select:focus {
      border-color: #2563eb;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .site-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #9ca3af;
    }
    .site-row img { border-radius: 3px; }

    /* 에러 배너 */
    .warn {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: #92400e;
      margin-bottom: 10px;
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }

    /* 에러 화면 */
    .error-screen {
      padding: 32px 20px;
      text-align: center;
      color: #888;
    }
    .error-icon { font-size: 32px; margin-bottom: 10px; }
    .error-title { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 6px; }
    .error-msg { font-size: 12px; line-height: 1.6; }

    /* 성공 화면 */
    .success-screen {
      padding: 40px 20px;
      text-align: center;
    }
    .success-icon { font-size: 36px; margin-bottom: 10px; }
    .success-title { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 6px; }
    .success-msg { font-size: 12px; color: #6b7280; }

    /* 설정 화면 */
    .settings-screen {
      padding: 16px;
    }
    .settings-screen h3 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #374151; }
    .settings-screen p { font-size: 12px; color: #6b7280; margin-bottom: 8px; line-height: 1.5; }

    /* 버튼 */
    .btn {
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
      margin-top: 4px;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      margin-top: 8px;
    }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn-save-text { font-size: 12px; font-weight: 400; opacity: 0.75; }

    /* 설정 저장 완료 토스트 */
    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      color: white;
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* 숨김 input */
    #fileInput { display: none; }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">📦</div>
    Damoajo
  </div>
  <button class="settings-btn" id="settingsToggle" title="설정">⚙️</button>
</div>

<!-- 로딩 -->
<div class="screen active" id="loadingScreen">
  <div class="loading">
    <div class="spinner"></div>
    <p>페이지 정보를 읽는 중...</p>
  </div>
</div>

<!-- 미리보기 & 저장 -->
<div class="screen" id="previewScreen">
  <div class="preview">
    <!-- 썸네일 -->
    <div class="thumbnail-wrap" id="thumbWrap">
      <div class="thumb-placeholder" id="thumbPlaceholder">
        <span>🖼</span>
        <span>이미지 없음 · 클릭하여 추가</span>
      </div>
      <img id="thumbImg" style="display:none" />
      <div class="thumb-overlay">
        <div class="thumb-overlay-icon">📷</div>
        <span>클릭하여 이미지 변경</span>
      </div>
    </div>
    <input type="file" id="fileInput" accept="image/*" />

    <!-- 경고 -->
    <div class="warn" id="warnBox" style="display:none">
      ⚠️ 이미지를 자동으로 가져오지 못했어요. 클릭해서 직접 추가하거나 제목을 수정해주세요.
    </div>

    <!-- 사이트 -->
    <div class="site-row">
      <img id="faviconImg" width="14" height="14" />
      <span id="siteNameEl"></span>
    </div>

    <!-- 제목 -->
    <div class="field">
      <label>제목</label>
      <input type="text" id="titleInput" placeholder="상품 제목" />
    </div>

    <!-- 가격 + 카테고리 -->
    <div class="row">
      <div class="field">
        <label>가격</label>
        <input type="text" id="priceInput" placeholder="예: 39,000원" />
      </div>
      <div class="field">
        <label>카테고리</label>
        <select id="categorySelect">
          <option>기타</option>
          <option>패션</option>
          <option>전자기기</option>
          <option>생활용품</option>
          <option>가죽</option>
          <option>운동</option>
          <option>식품</option>
          <option>자동차</option>
          <option>놀이</option>
          <option>즐겨찾기</option>
        </select>
      </div>
    </div>

    <!-- 에러 -->
    <div id="saveError" style="display:none; color:#dc2626; font-size:12px; margin-bottom:8px;"></div>

    <button class="btn btn-primary" id="saveBtn">
      <span>저장하기</span>
    </button>
  </div>
</div>

<!-- 성공 -->
<div class="screen" id="successScreen">
  <div class="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">저장되었습니다!</div>
    <div class="success-msg" id="successMsg"></div>
    <button class="btn btn-secondary" id="openAppBtn">앱에서 보기 →</button>
  </div>
</div>

<!-- 오류 -->
<div class="screen" id="errorScreen">
  <div class="error-screen">
    <div class="error-icon">😕</div>
    <div class="error-title">페이지 정보를 읽지 못했어요</div>
    <div class="error-msg" id="errorMsg">페이지를 새로고침 후 다시 시도해주세요.</div>
  </div>
</div>

<!-- 설정 -->
<div class="screen" id="settingsScreen">
  <div class="settings-screen">
    <h3>⚙️ Damoajo 설정</h3>
    <p>Damoajo 앱 주소를 입력하세요.<br>로컬: <strong>http://localhost:3000</strong><br>배포 후: <strong>https://yourdomain.com</strong></p>
    <div class="field">
      <label>앱 주소</label>
      <input type="url" id="appUrlInput" placeholder="https://yourdomain.com" />
    </div>
    <p style="margin-top:8px;">Supabase Anon Key를 입력하세요.</p>
    <div class="field">
      <label>Supabase URL</label>
      <input type="url" id="supabaseUrlInput" placeholder="https://xxx.supabase.co" />
    </div>
    <div class="field">
      <label>Supabase Anon Key</label>
      <input type="text" id="supabaseKeyInput" placeholder="eyJ..." />
    </div>
    <button class="btn btn-primary" id="saveSettingsBtn">저장</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
